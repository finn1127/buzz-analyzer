<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Buzz Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2d55;
    --pink: #ff6b8a;
    --dark: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --accent: #00f5d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(255,45,85,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,245,212,0.04) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(3deg); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 30px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--red);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: iconPop 2s ease-in-out infinite;
  }

  @keyframes iconPop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    letter-spacing: 3px;
    background: linear-gradient(135deg, #fff 30%, var(--red) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Search panel */
  .search-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .search-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .input-group {
    flex: 1;
    min-width: 200px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-group input, .input-group select {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus, .input-group select:focus {
    border-color: var(--red);
  }

  .input-group select option {
    background: var(--dark);
  }

  .search-btn {
    align-self: flex-end;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover:not(:disabled) {
    background: var(--pink);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,45,85,0.35);
  }

  .search-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .loading.active { display: block; }

  .loading-bars {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    height: 50px;
    margin-bottom: 16px;
  }

  .bar {
    width: 8px;
    border-radius: 4px;
    background: var(--red);
    animation: barAnim 1s ease-in-out infinite;
  }

  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.15s; }
  .bar:nth-child(3) { animation-delay: 0.3s; }
  .bar:nth-child(4) { animation-delay: 0.45s; }
  .bar:nth-child(5) { animation-delay: 0.6s; }

  @keyframes barAnim {
    0%, 100% { height: 12px; opacity: 0.4; }
    50% { height: 46px; opacity: 1; }
  }

  .loading p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* Results */
  .results { display: none; }
  .results.active { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: gap;
    gap: 12px;
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .keyword-badge {
    background: rgba(255,45,85,0.15);
    border: 1px solid rgba(255,45,85,0.3);
    color: var(--red);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }

  /* Section cards */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(16px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.2s; }
  .section:nth-child(5) { animation-delay: 0.25s; }

  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 2px;
    background: var(--red);
  }

  /* Hashtag bubbles */
  .hashtag-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .hashtag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .hashtag.hot {
    background: rgba(255,45,85,0.15);
    border-color: rgba(255,45,85,0.4);
    color: #ff6b8a;
  }

  .hashtag.warm {
    background: rgba(255,165,0,0.12);
    border-color: rgba(255,165,0,0.3);
    color: #ffb347;
  }

  .hashtag.cool {
    background: rgba(0,245,212,0.1);
    border-color: rgba(0,245,212,0.25);
    color: var(--accent);
  }

  .hashtag:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  .hashtag-count {
    font-size: 10px;
    opacity: 0.7;
    font-weight: 400;
  }

  /* Content ideas */
  .idea-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .idea-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border-left: 3px solid var(--red);
    transition: background 0.2s;
  }

  .idea-item:hover {
    background: rgba(255,255,255,0.05);
  }

  .idea-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--red);
    line-height: 1;
    min-width: 28px;
  }

  .idea-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .idea-hooks {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Affiliate opportunities */
  .affili-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .affili-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: all 0.2s;
  }

  .affili-card:hover {
    border-color: rgba(255,45,85,0.4);
    background: rgba(255,45,85,0.05);
  }

  .affili-icon { font-size: 24px; margin-bottom: 8px; }
  .affili-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .affili-desc { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
  .affili-earning {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--red);
    letter-spacing: 1px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Script section */
  .script-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .script-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .script-label:first-child { margin-top: 0; }

  /* Platform switcher */
  .platform-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }

  .platform-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 28px;
    border-radius: 30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .platform-tab:hover { color: var(--text); border-color: #444; }

  .platform-tab.active-tiktok {
    background: rgba(255,45,85,0.15);
    border-color: var(--red);
    color: #fff;
  }

  .platform-tab.active-instagram {
    background: rgba(193,53,132,0.15);
    border-color: #c13584;
    color: #fff;
  }

  .platform-tab .tab-icon { font-size: 18px; }

  /* Today's Buzz Tags */
  .today-section {
    margin-bottom: 32px;
  }

  .today-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .today-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .today-title .live-dot {
    width: 7px;
    height: 7px;
    background: var(--red);
    border-radius: 50%;
    animation: livePulse 1.4s ease-in-out infinite;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .refresh-btn:hover:not(:disabled) {
    border-color: var(--red);
    color: var(--red);
  }

  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .genre-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .genre-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  .genre-row:nth-child(1) { animation-delay: 0.05s; }
  .genre-row:nth-child(2) { animation-delay: 0.1s; }
  .genre-row:nth-child(3) { animation-delay: 0.15s; }
  .genre-row:nth-child(4) { animation-delay: 0.2s; }

  .genre-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .genre-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .genre-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    border: 1px solid transparent;
  }

  .genre-tag.hot {
    background: rgba(255,45,85,0.13);
    border-color: rgba(255,45,85,0.35);
    color: #ff6b8a;
  }

  .genre-tag.warm {
    background: rgba(255,165,0,0.1);
    border-color: rgba(255,165,0,0.28);
    color: #ffb347;
  }

  .genre-tag.cool {
    background: rgba(0,245,212,0.08);
    border-color: rgba(0,245,212,0.22);
    color: var(--accent);
  }

  .genre-tag:hover {
    transform: scale(1.06);
    filter: brightness(1.25);
  }

  .genre-tag .tag-rank {
    font-size: 9px;
    opacity: 0.65;
    font-weight: 400;
  }

  .today-loading {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    text-align: center;
  }

  .today-loading .loading-bars {
    height: 30px;
    margin-bottom: 10px;
  }

  .today-loading .bar { background: var(--muted); }

  .today-loading p {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* API Key Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .modal p a { color: var(--red); text-decoration: none; }

  .modal input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: var(--red); }

  .modal-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn:hover { background: var(--pink); }

  .modal-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
  }

  .api-key-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    z-index: 50;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .api-key-btn:hover { border-color: var(--red); color: var(--red); }

  /* Error */
  .error-box {
    display: none;
    background: rgba(255,45,85,0.1);
    border: 1px solid rgba(255,45,85,0.3);
    border-radius: 12px;
    padding: 20px;
    color: var(--pink);
    text-align: center;
    margin-bottom: 20px;
  }

  .error-box.active { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .search-row { flex-direction: column; }
    .search-btn { width: 100%; }
    .affili-grid { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon" id="logoIcon">🔥</div>
      <h1 id="mainTitle">TikTok Buzz Analyzer</h1>
    </div>
    <p class="tagline">AI-Powered Trend Research · Powered by Claude</p>
    <div class="platform-tabs">
      <button class="platform-tab active-tiktok" id="tabTiktok" onclick="switchPlatform('tiktok')">
        <span class="tab-icon">🎵</span> TikTok
      </button>
      <button class="platform-tab" id="tabInstagram" onclick="switchPlatform('instagram')">
        <span class="tab-icon">📸</span> Instagram
      </button>
    </div>
  </header>

  <!-- Today's Buzz Tags -->
  <div class="today-section">
    <div class="today-header">
      <div class="today-title">
        <div class="live-dot"></div>
        TODAY'S BUZZ TAGS
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadTodayTags(true)">↻ 更新</button>
    </div>
    <div id="cacheInfo" style="font-size:11px; color:var(--muted); margin-bottom:10px; letter-spacing:1px;"></div>
    <div id="todayTags">
      <div class="today-loading">
        <div class="loading-bars">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
        </div>
        <p>今日のバズタグを取得中...</p>
      </div>
    </div>
  </div>

  <div class="search-panel">
    <div class="search-row">
      <div class="input-group">
        <label>キーワード</label>
        <input type="text" id="keyword" placeholder="例: ダイエット、美容、副業..." />
      </div>
      <div class="input-group" style="max-width: 160px;">
        <label>ジャンル</label>
        <select id="genre">
          <option value="general">すべて</option>
          <option value="diet">ダイエット・美容</option>
          <option value="money">副業・お金</option>
          <option value="food">グルメ・料理</option>
          <option value="gadget">ガジェット・家電</option>
          <option value="fashion">ファッション</option>
          <option value="anime">アニメ・エンタメ</option>
        </select>
      </div>
      <button class="search-btn" id="searchBtn" onclick="analyze()">ANALYZE</button>
    </div>
  </div>

  <div class="error-box" id="errorBox">
    APIキーの設定が必要です。右上の設定ボタンからAnthropicのAPIキーを入力してください。
  </div>

  <div class="loading" id="loading">
    <div class="loading-bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <p id="loadingText">AIがTikTokトレンドを分析中...</p>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
// プラットフォーム状態
let currentPlatform = 'tiktok';

function switchPlatform(platform) {
  if (currentPlatform === platform) return;
  currentPlatform = platform;

  const isTiktok = platform === 'tiktok';

  // タブ切り替え

const CACHE_TTL = 60 * 60 * 1000; // 1時間

function renderTodayTags(parsed) {
